<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>hash-visualiser — SHA-256 round</title>
    <link rel="stylesheet" href="web/style.css">
</head>

<body>
    <header id="title">
        <h1>hash-visualiser</h1>
        <p class="subtitle">
            The built-in <code>.hv</code> example, parsed and rendered to live SVG directly in the browser DOM from
            Rust/WebAssembly using the <code>svg-dom</code> crate.
        </p>
        <div id="error-banner"></div>
    </header>

    <main id="stage">
        <!-- #diagram shrink-wraps to the diagram canvas, so the transport bar below can match its exact width. -->
        <div id="diagram">
            <!-- svg_dom::SvgRoot::create_in() appends a sized <svg> here -->
            <div id="app" class="canvas"></div>

            <!-- Transport bar: svg_dom::SvgRoot::create_in("transport", ...) appends the step buttons here.
                 Fills #diagram, so it lines up with the canvas above it. -->
            <footer id="transport"></footer>
        </div>
    </main>

    <script type="module">
        import init, { run } from './pkg/hash_visualiser.js';

        // The .hv source is fetched at runtime and polled for changes, so editing the file re-renders the diagram
        // live — no wasm rebuild or server restart needed.
        const HV_URL = '/hv/sha3.hv';
        const POLL_MS = 1000;

        const app = document.getElementById('app');
        const transport = document.getElementById('transport');
        const banner = document.getElementById('error-banner');

        let lastSource = null;

        function render(source) {
            // Clear the previous render before drawing afresh (run() appends new <svg> elements).
            app.innerHTML = '';
            transport.innerHTML = '';
            try {
                run('app', source);
                banner.style.display = 'none';
                banner.textContent = '';
            } catch (err) {
                banner.style.display = 'block';
                banner.textContent = `Error: ${err}`;
                console.error(err);
            }
        }

        async function poll() {
            let source;
            try {
                source = await fetch(HV_URL, { cache: 'no-store' }).then(r => r.text());
            } catch (e) {
                return; // transient fetch failure — try again next tick
            }
            if (source === lastSource) return; // unchanged since last render
            lastSource = source;
            render(source);
        }

        await init();
        await poll();                  // initial render
        setInterval(poll, POLL_MS);    // live reload on file change
    </script>
</body>

</html>
